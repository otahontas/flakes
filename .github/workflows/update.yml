name: Update

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update:
    strategy:
      fail-fast: false
      matrix:
        package:
          - pi-mcp-adapter
          - pi-subagents
          - pi-web-access
          - pi-ralph-loop
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - uses: cachix/install-nix-action@v31

      - name: Run update
        run: nix develop -c bash packages/${{ matrix.package }}/update.sh

      - name: Check for changes
        id: changed
        run: |
          if git diff --quiet packages/${{ matrix.package }}/hashes.json; then
            echo "updated=false" >> "$GITHUB_OUTPUT"
          else
            echo "updated=true" >> "$GITHUB_OUTPUT"
            python3 -c "import json; print(json.load(open('packages/${{ matrix.package }}/hashes.json'))['version'])" > version.txt
          fi

      - name: Create PR
        if: steps.changed.outputs.updated == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          BRANCH="update/${{ matrix.package }}"
          VERSION=$(cat version.txt)
          TITLE="${{ matrix.package }} $VERSION"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add packages/${{ matrix.package }}/
          git commit -m "$TITLE"
          git push --force origin "HEAD:$BRANCH"

          if PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number // empty' | grep .); then
            gh pr edit "$PR" --title "$TITLE" --body "Automated update of ${{ matrix.package }} to $VERSION."
          else
            gh pr create \
              --title "$TITLE" \
              --body "Automated update of ${{ matrix.package }} to $VERSION." \
              --base main --head "$BRANCH" \
              --label automated
          fi
